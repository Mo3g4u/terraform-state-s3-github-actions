name: Terraform

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - stg
          - prod
      action:
        description: "Action to perform"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: ap-northeast-1
  AWS_ROLE_ARN: arn:aws:iam::456788081138:role/github-actions-terraform

jobs:
  # ---------------------------------------------------------------------------
  # plan: runs for PRs, pushes to main, and manual dispatch (action=plan)
  # ---------------------------------------------------------------------------
  plan:
    name: Plan (${{ matrix.environment }})
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.action == 'plan'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJSON(github.event_name == 'workflow_dispatch' && format('["{0}"]', github.event.inputs.environment) || '["dev","stg","prod"]') }}
    defaults:
      run:
        working-directory: terraform/environments/${{ matrix.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Read .terraform-version
        id: tfversion
        run: echo "version=$(cat .terraform-version)" >> "$GITHUB_OUTPUT"
        working-directory: .

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ steps.tfversion.outputs.version }}
          terraform_wrapper: true

      - name: Terraform fmt
        id: fmt
        run: terraform fmt -check -recursive
        working-directory: .

      - name: Terraform init
        id: init
        run: terraform init -input=false

      - name: Terraform validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform plan
        id: plan
        run: terraform plan -no-color -input=false -out=tfplan
        continue-on-error: true

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN_STDOUT: "${{ steps.plan.outputs.stdout }}"
        with:
          script: |
            const env = "${{ matrix.environment }}";
            const fmt = "${{ steps.fmt.outcome }}";
            const init = "${{ steps.init.outcome }}";
            const validate = "${{ steps.validate.outcome }}";
            const plan = "${{ steps.plan.outcome }}";
            const planOutput = (process.env.PLAN_STDOUT || "").slice(0, 60000);

            const body = `### Terraform Plan: \`${env}\`

            | Step | Result |
            | --- | --- |
            | fmt | \`${fmt}\` |
            | init | \`${init}\` |
            | validate | \`${validate}\` |
            | plan | \`${plan}\` |

            <details><summary>Show plan</summary>

            \`\`\`hcl
            ${planOutput}
            \`\`\`

            </details>

            *Triggered by @${{ github.actor }} on \`${{ github.sha }}\`*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = `### Terraform Plan: \`${env}\``;
            const existing = comments.find(c => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ---------------------------------------------------------------------------
  # apply: runs on push to main, or manual dispatch (action=apply)
  # Each environment is gated by GitHub Environments protection rules
  # ---------------------------------------------------------------------------
  apply:
    name: Apply (${{ matrix.environment }})
    needs: plan
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        environment: ${{ fromJSON(github.event_name == 'workflow_dispatch' && format('["{0}"]', github.event.inputs.environment) || '["dev","stg","prod"]') }}
    environment: ${{ matrix.environment }}
    defaults:
      run:
        working-directory: terraform/environments/${{ matrix.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Read .terraform-version
        id: tfversion
        run: echo "version=$(cat .terraform-version)" >> "$GITHUB_OUTPUT"
        working-directory: .

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ steps.tfversion.outputs.version }}
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init -input=false

      # Plan + apply in the same job, deliberately not reusing the plan ジョブ's
      # tfplan artifact. Passing a saved plan across jobs triggers
      # "Saved plan is stale" because the two jobs run on separate runners and
      # Terraform records refresh state in the plan file. Re-planning inside
      # the apply job keeps the snapshot consistent with the apply.
      - name: Terraform apply
        run: terraform apply -input=false -auto-approve
